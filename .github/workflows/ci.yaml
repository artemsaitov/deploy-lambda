name: CI (test)

on: [push]
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-lab

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test
        run: pytest 

      - name: Run linter
        run: flake8 .    
  
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-lab

    permissions:
      id-token: write
      contents: read

    needs: test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::443245369180:role/github-actions-lambda-deploy-role
          aws-region: us-east-1
          
      - name: Prepare Lambda package
        run: |
          cp app/calculator.py lambda_function.py
          zip function.zip lambda_function.py

       
        
      - name: Create or update Lambda
        run: |
          FUNCTION_NAME="calculator-app"
          LAMBDA_EXECUTION_ROLE_ARN="arn:aws:iam::443245369180:role/lambda-execution-role"

          if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            echo "Lambda exists. Updating code..."

            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://function.zip

          else
            echo "Lambda does not exist. Creating function..."

            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime python3.11 \
              --role "$LAMBDA_EXECUTION_ROLE_ARN" \
              --handler lambda_function.lambda_handler \
              --zip-file fileb://function.zip

          fi


